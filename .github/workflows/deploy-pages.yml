name: Deploy generated apps to GitHub Pages

# Deliberately workflow_dispatch ONLY. A push trigger on apps/** once
# deployed an app before QA/Review/the human gate had run, because a
# progress-commit and an authorized release look identical to a push
# trigger. Do not add a push trigger back - the studio-build Skill
# dispatches this workflow explicitly after the Delivery gate.
# See docs/DECISIONS.md: "Deploy must be an explicit trigger".
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps

      - id: deployment
        uses: actions/deploy-pages@v4
