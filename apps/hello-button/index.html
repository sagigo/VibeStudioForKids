<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(180deg, #fff6d8 0%, #ffe0ec 50%, #d8f0ff 100%);
    font-family: "Comic Sans MS", "Trebuchet MS", Verdana, sans-serif;
    gap: 2.5rem;
    text-align: center;
  }

  h1 {
    font-size: clamp(3rem, 12vw, 6rem);
    margin: 0;
    color: #ff5da2;
    text-shadow:
      3px 3px 0 #ffffff,
      6px 6px 0 rgba(0, 0, 0, 0.08);
    letter-spacing: 2px;
  }

  .big-red-button {
    font-family: inherit;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    font-weight: bold;
    color: #ffffff;
    background: radial-gradient(circle at 35% 30%, #ff6b6b, #e01e1e 70%);
    border: 6px solid #a80000;
    border-radius: 50%;
    width: clamp(160px, 30vw, 260px);
    height: clamp(160px, 30vw, 260px);
    box-shadow:
      0 8px 0 #a80000,
      0 12px 18px rgba(0, 0, 0, 0.3);
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>Hello!</h1>
  <button type="button" class="big-red-button">Press Me!</button>
</body>
</html>
